name: Build and Release frps/frpc

on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一 UTC 00:00
  workflow_dispatch:  # 支持手动触发

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check latest frp version
        id: check
        run: |
          set +e
          
          LATEST_VERSION=$(curl -s https://api.github.com/repos/fatedier/frp/releases/latest | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/')
          echo "Latest version: $LATEST_VERSION"
          
          if [ -z "$LATEST_VERSION" ]; then
            echo "Failed to get latest version"
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          RESPONSE=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${LATEST_VERSION}")
          
          if echo "$RESPONSE" | grep -q '"tag_name"'; then
            echo "Version $LATEST_VERSION already released"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New version found: $LATEST_VERSION"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
          
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

  download-binaries:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64, arm]
    
    steps:
      - name: Download frps binary
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          ARCH=${{ matrix.arch }}
          
          echo "Downloading frps v${VERSION} for ${ARCH}..."
          
          # 下载 frps
          curl -fsSL -o frps.tar.gz "https://github.com/fatedier/frp/releases/download/v${VERSION}/frp_${VERSION}_linux_${ARCH}.tar.gz"
          tar -xzf frps.tar.gz
          
          # 重命名二进制文件
          mv frp_${VERSION}_linux_${ARCH}/frps frps_linux_${ARCH}
          mv frp_${VERSION}_linux_${ARCH}/frpc frpc_linux_${ARCH}
          
          # 添加执行权限
          chmod +x frps_linux_${ARCH} frpc_linux_${ARCH}
          
          # 创建校验和
          sha256sum frps_linux_${ARCH} frpc_linux_${ARCH} > checksums_${ARCH}.txt
          
          echo "Downloaded successfully:"
          ls -la frps_linux_${ARCH} frpc_linux_${ARCH}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.arch }}
          path: |
            frps_linux_*
            frpc_linux_*
            checksums_*.txt

  build-docker:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: arm
            platform: linux/arm/v7
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download binaries for Docker build
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          ARCH=${{ matrix.arch }}
          
          curl -fsSL -o frps.tar.gz "https://github.com/fatedier/frp/releases/download/v${VERSION}/frp_${VERSION}_linux_${ARCH}.tar.gz"
          tar -xzf frps.tar.gz
          
          cp frp_${VERSION}_linux_${ARCH}/frps ./frps
          cp frp_${VERSION}_linux_${ARCH}/frpc ./frpc
          chmod +x ./frps ./frpc

      - name: Build and push frps
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frps
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            acallsh/frps:${{ needs.check-version.outputs.version }}-${{ matrix.arch }}
            acallsh/frps:latest-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frpc
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frpc
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            acallsh/frpc:${{ needs.check-version.outputs.version }}-${{ matrix.arch }}
            acallsh/frpc:latest-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: [check-version, download-binaries]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: frps/frpc v${{ needs.check-version.outputs.version }}
          body: |
            ## frps/frpc v${{ needs.check-version.outputs.version }}
            
            ### Downloads
            
            | Architecture | frps | frpc | Checksums |
            |-------------|------|------|-----------|
            | amd64 | [frps_linux_amd64](https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/frps_linux_amd64) | [frpc_linux_amd64](https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/frpc_linux_amd64) | [checksums_amd64.txt](https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/checksums_amd64.txt) |
            | arm64 | [frps_linux_arm64](https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/frps_linux_arm64) | [frpc_linux_arm64](https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/frpc_linux_arm64) | [checksums_arm64.txt](https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/checksums_arm64.txt) |
            
            ### Docker Images
            
            ```bash
            # Docker Hub
            docker pull acallsh/frps:${{ needs.check-version.outputs.version }}-amd64
            docker pull acallsh/frpc:${{ needs.check-version.outputs.version }}-amd64
            docker pull acallsh/frps:${{ needs.check-version.outputs.version }}-arm64
            docker pull acallsh/frpc:${{ needs.check-version.outputs.version }}-arm64
            docker pull acallsh/frps:${{ needs.check-version.outputs.version }}-arm
            docker pull acallsh/frpc:${{ needs.check-version.outputs.version }}-arm
            ```
            
            ### Quick Start
            
            ```bash
            # Download and install frps
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/frps_linux_amd64 -o /usr/local/bin/frps
            chmod +x /usr/local/bin/frps
            
            # Download and install frpc
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/frpc_linux_amd64 -o /usr/local/bin/frpc
            chmod +x /usr/local/bin/frpc
            ```
            
            ### Author
            
            **Ac.All.Sh** - [GitHub](https://github.com/Ac-All-Sh)
          files: |
            artifacts/binaries-amd64/*
            artifacts/binaries-arm64/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old releases
        run: |
          set +e
          releases=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/' | tail -n +11)
          for version in $releases; do
            echo "Deleting release v${version}..."
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${version}" || true
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/v${version}" || true
          done
